version: "3.9"

services:
  bgbot:
    image: ghcr.io/tawilkinson/boardgamebot:latest
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
    env_file: bot/python/.env
    network_mode: host
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true
    deploy:
      resources:
        limits:
          cpus: "0.5"
