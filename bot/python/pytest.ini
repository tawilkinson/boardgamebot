[pytest]
# Run pytest from this directory (bot/python). The bot imports modules as
# `utils.*` / `cogs.*`, so the package root must be on sys.path.
pythonpath = .
testpaths = tests
asyncio_mode = auto
markers =
    live: tests that hit real external services (BGG + game sites). Deselected by default.
# Exclude the live suite from the default run. Override with `pytest -m live`.
addopts = -m "not live"
